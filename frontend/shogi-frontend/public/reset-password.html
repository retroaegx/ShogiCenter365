<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <link rel="stylesheet" href="/shogi-assets/site.css?v=static-v6" />
  <title>パスワード再設定 | 将棋センター365</title>
</head>
<body class="shogi-static-body">
  <div class="shogi-static">
    <div id="staticHeader"></div>

    <main>
      <section class="page-hero">
        <div class="container">
          <div class="paper-pane page-pane">
            <header class="page-head">
              <h1 class="page-title">パスワード再設定</h1>
              <p class="page-desc">新しいパスワードを設定します。</p>
            </header>

            <div class="page-body">
              <form class="form-card" id="resetForm" onsubmit="return false;" style="max-width: 560px;">
                <label>新しいパスワード
                  <input name="pw" type="password" required placeholder="8文字以上（大文字/小文字/数字）" autocomplete="new-password" />
                </label>
                <label>新しいパスワード（確認）
                  <input name="pw2" type="password" required placeholder="もう一度入力" autocomplete="new-password" />
                </label>
                <button class="primary" id="resetSubmit" type="button">更新</button>
                <p class="muted" id="resetMsg" aria-live="polite"></p>

                <div style="margin-top: 12px; display:flex; gap: 10px; flex-wrap: wrap;">
                  <a class="ghost" href="/">トップへ戻る</a>
                  <a class="ghost" href="/#account">ログインへ</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="staticFooter"></div>
  </div>

  <script defer src="/shogi-assets/static_shell.js?v=static-v6"></script>

  <script>
  const btn = document.getElementById('resetSubmit');
  const form = document.getElementById('resetForm');
  const msg = document.getElementById('resetMsg');

  function setMsg(text, ok) {
    if (!msg) return;
    msg.textContent = text || '';
    msg.style.color = ok ? '#2f6b2f' : '#b04444';
  }

  function validatePassword(pw) {
    if (!pw || pw.length < 8) return 'パスワードは8文字以上で入力してください';
    if (!/[A-Z]/.test(pw)) return 'パスワードは大文字を1つ以上含めてください';
    if (!/[a-z]/.test(pw)) return 'パスワードは小文字を1つ以上含めてください';
    if (!/\d/.test(pw)) return 'パスワードは数字を1つ以上含めてください';
    return null;
  }

  btn?.addEventListener('click', async () => {
    if (!form) return;
    const sp = new URLSearchParams(location.search);
    const token = (sp.get('token') || '').trim();
    if (!token) {
      setMsg('token が見つかりませんでした。メールのリンクを開き直してください。', false);
      return;
    }

    const pw = (form.pw?.value || '').trim();
    const pw2 = (form.pw2?.value || '').trim();

    const err = validatePassword(pw);
    if (err) {
      setMsg(err, false);
      return;
    }
    if (pw !== pw2) {
      setMsg('パスワードが一致しません。', false);
      return;
    }

    btn.disabled = true;
    setMsg('更新中...', true);
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: pw }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data || data.success === false) {
        const m = (data && (data.message || data.error)) || '更新に失敗しました';
        setMsg(m, false);
        return;
      }
      setMsg(data.message || 'パスワードを更新しました。ログインしてください。', true);
      form.reset();
    } catch (e) {
      setMsg('更新に失敗しました（通信エラー）', false);
    } finally {
      btn.disabled = false;
    }
  });
  </script>
</body>
</html>
